<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cryptocurrency Monthly Prices Comparison</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #212529;
        --muted-text: #6c757d;
        --border-color: #e5e7eb;
        --card-bg: #ffffff;
        --input-bg: #ffffff;
        --input-border: #ced4da;
        --chart-bg: #ffffff;
        --chart-border: #e5e7eb;
        --button-bg: #f8f9fa;
        --button-border: #dee2e6;
        --button-hover: #e9ecef;
      }

      [data-theme="dark"] {
        --bg-color: #1a1a1a;
        --text-color: #ffffff;
        --muted-text: #adb5bd;
        --border-color: #495057;
        --card-bg: #2d3436;
        --input-bg: #495057;
        --input-border: #6c757d;
        --chart-bg: #2d3436;
        --chart-border: #495057;
        --button-bg: #495057;
        --button-border: #6c757d;
        --button-hover: #6c757d;
      }

      body {
        font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
        padding: 20px;
        background-color: var(--bg-color);
        color: var(--text-color);
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      .container {
        max-width: 1000px;
      }

      .controls {
        margin-bottom: 16px;
      }

      #chartCanvas {
        width: 100%;
        height: 400px;
        border: 1px solid var(--chart-border);
        border-radius: 6px;
        background: var(--chart-bg);
        max-width: 900px;
        margin: 0 auto;
        display: block;
      }

      #status {
        margin-top: 8px;
        color: var(--muted-text);
      }

      .text-muted {
        color: var(--muted-text) !important;
      }

      .form-select {
        background-color: var(--input-bg);
        border-color: var(--input-border);
        color: var(--text-color);
      }

      .form-select:focus {
        background-color: var(--input-bg);
        border-color: var(--input-border);
        color: var(--text-color);
        box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
      }

      .theme-toggle {
        position: fixed;
        top: 20px;
        right: 20px;
        background: var(--button-bg);
        border: 1px solid var(--button-border);
        border-radius: 50%;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
        z-index: 1000;
      }

      .theme-toggle:hover {
        background: var(--button-hover);
      }

      .theme-toggle svg {
        width: 24px;
        height: 24px;
        fill: var(--text-color);
      }
    </style>
  </head>
  <body>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
      <svg id="sunIcon" viewBox="0 0 24 24" style="display: none;">
        <path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.758 17.303a.75.75 0 00-1.061-1.06l-1.591 1.59a.75.75 0 001.06 1.061l1.591-1.59zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.697 7.757a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591z"/>
      </svg>
      <svg id="moonIcon" viewBox="0 0 24 24">
        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
      </svg>
    </button>

    <div class="container">
      <div class="row mb-3">
        <div class="col">
          <h3 class="mb-0">Cryptocurrency Monthly Prices by Year</h3>
          <div class="text-muted">Monthly average prices for the last 5 years</div>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4">
          <label for="coinSelect" class="form-label">Select Cryptocurrency</label>
          <select class="form-select" id="coinSelect">
            <option value="bitcoin">Bitcoin</option>
            <option value="ethereum">Ethereum</option>
            <option value="solana">Solana</option>
            <option value="xrp">XRP</option>
            <option value="cardano">Cardano</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="col-12">
          <canvas id="chartCanvas" width="800" height="400"></canvas>
          <div id="status" class="mt-2 text-muted"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="site.js"></script>
  </body>
</html>
