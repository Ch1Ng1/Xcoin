name: Build Docs for GitHub Pages

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Blazor app
        run: dotnet publish ./XCoinBlazor/XCoinBlazor.csproj -c Release -o ./docs

      - name: Configure GitHub Pages base href
        run: sed -i 's|<base href="/" />|<base href="/Xcoin/" />|' ./docs/wwwroot/index.html

      - name: Move publish output to docs root
        run: |
          cp -r ./docs/wwwroot/* ./docs/
          rm -rf ./docs/wwwroot
          touch ./docs/.nojekyll

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "Update docs build"
          git push